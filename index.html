<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Bull - Explore seus Gatilhos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-default">
    
    <header>
        <img src="https://via.placeholder.com/150x50?text=LOGO+REDBULL" alt="Red Bull Logo" class="logo">
    </header>

    <section id="hero">
        <div class="hero-content">
            <h1 id="main-title">Red Bull te dá asas.</h1>
            <p id="main-description">O clássico que você já conhece, para qualquer hora do dia.</p>
            <button class="cta-button">Compre Agora</button>
        </div>
        <div class="hero-image">
            <img id="product-img" src="https://via.placeholder.com/300x500?text=LATINHA+TRADICIONAL" alt="Red Bull Can">
        </div>
    </section>

    <nav class="trigger-menu">
        <p>Qual é o seu momento agora?</p>
        <div class="buttons">
            <button onclick="changeTheme('default')">Tradicional</button>
            <button onclick="changeTheme('esportes')">Esportes</button>
            <button onclick="changeTheme('fitness')">Fitness (Zero)</button>
            <button onclick="changeTheme('lazer')">Lazer / Festa</button>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
